<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - EchoMind AI API 检测平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 2rem;
            width: calc(100% - 2rem);
            max-width: 420px;
            margin: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        @media (min-width: 576px) {
            .login-card {
                padding: 3rem;
            }
        }

        @media (max-width: 576px) {
            .login-title i {
                font-size: 2.5rem;
            }

            .login-title h4 {
                font-size: 1.25rem;
            }

            .form-control {
                font-size: 16px;
                /* 防止iOS缩放 */
                padding: 0.75rem 1rem;
            }

            .btn-primary {
                padding: 0.75rem;
                font-size: 1rem;
            }
        }

        .login-title {
            color: #1e293b;
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-title i {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        .login-title h4 {
            font-weight: 700;
            color: #1e293b;
        }

        .login-title .text-secondary {
            color: #64748b !important;
        }

        .form-control {
            background: #f1f5f9;
            border: 2px solid #e2e8f0;
            color: #1e293b;
            padding: 0.875rem 1rem;
            border-radius: 12px;
            font-size: 1rem;
        }

        .form-control:focus {
            background: #ffffff;
            border-color: var(--primary-color);
            color: #1e293b;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .form-control::placeholder {
            color: #94a3b8;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
            border: none;
            padding: 0.875rem;
            font-weight: 600;
            border-radius: 12px;
            font-size: 1rem;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #4338ca 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .alert {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-title">
            <i class="bi bi-cpu"></i>
            <h4><strong>EchoMind</strong> AI API 检测平台</h4>
            <p class="text-secondary mb-0">请输入访问密钥</p>
        </div>

        {% if error %}
        <div class="alert alert-danger" role="alert">
            <i class="bi bi-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="mb-4">
                <input type="password" class="form-control" name="key" placeholder="访问密钥" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> 登录
            </button>
        </form>
    </div>
</body>

</html>
